name: 🪲 Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. iOS, Windows 11, Ubuntu 22.04
    validations:
      required: true
  - type: input
    id: dotnet_version
    attributes:
      label: .NET Version
      placeholder: e.g. 9.0, include installed packages if relevant
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HPort Version
      placeholder: e.g. 1.0
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
